<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Livro</title>
</head>
<body>
    <h1>Atualizar Livros</h1>
    <form id="formLivro">
        <label>
            id:
            <input type="text" id="titulo" required>
        </label>

        <label>
            titulo:
            <input type="text" id="descricao" required>
        </label>

        <label>
            Descricao:
            <input type="text" id="descricao" required>
        </label>

        <label>
            Autor:
            <input type="text" id="autor" required>
        </label>

        <button type="submit">Atualizar Livro</button>
    </form>

    <p id="mensagem"></p>

    <script>
        const API_BASE = "http://localhost/ProjetoGestaoAcervoBibliotecario/api_livros";

        async function getLivro(id) {
            try{
               await fetch('${API_BASE}/livroId?id=${id}');
            }catch(erro){
                throw erro;

            }
        }
        document.addEventListener("DOMContentLoaded" , async () => {
            //toda vez que a página carregar buscar dados preencher tela
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            const dados = await getLivro(id);
            preencherForm(dados);
        })
    </script>
</body>
</html>
